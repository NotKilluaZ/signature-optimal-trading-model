name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --tag sigstop-gs-ms-ci .

      - name: Run unit tests
        run: docker run --rm sigstop-gs-ms-ci pytest

      - name: Validate package environment
        run: docker run --rm sigstop-gs-ms-ci python -m pip check

      - name: Compile Python sources
        run: docker run --rm sigstop-gs-ms-ci python -m compileall src scripts tests
